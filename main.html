<!DOCTYPE html>
<html lang="en-pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio final HTML</title>
</head>

<body>
    <h1>Pagina de destino ao seu curso</h1>
    
    <form action="">
    <div>
        <label for="titulo">Titulo do curso:</label>
            <input type="text" name="titulo" id="titulo" required > <!--required serve para avisar o usuario pra preencher os campos -->
    </div>
    <div>
        <p>Descrição do Curso:</p>
    </div>

    <textarea name="descricao" id="" rows="15" cols="30"></textarea>
    <div>
        <label for="selecione">qual seu nivel:</label>
        <select name="seletor" id="selecione">selecione
            <option value="">iniciante</option>
            <option value="">medio</option>
            <option value="">avançado </option>
        </select>
    </div>
    <div>
        <label for="curso">deseja adquirir esse curso? </label>
        <input type="checkbox">
        <div>
            <button id="curso">escrever</button>
        </div>
        

    <div>
    </form>
</body>
</html>
